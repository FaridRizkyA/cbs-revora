<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 0; }
        .container { max-width: 600px; width: 100%; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); margin-top: 40px; margin-bottom: 40px; border-top: 6px solid #1d4ed8; }
        
        .logo-wrapper { text-align: center; padding: 35px 0 20px 0; background-color: #ffffff; }
        .logo { max-width: 180px; height: auto; }

        .content { padding: 0 40px 40px 40px; }

        .title { color: #0f172a; font-size: 24px; font-weight: 700; margin-top: 10px; margin-bottom: 20px; text-align: center; }
        .text { color: #475569; font-size: 15px; line-height: 1.6; margin-bottom: 20px; }
        
        .footer { background-color: #f8fafc; padding: 25px; text-align: center; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0; }
        .brand-name { color: #1d4ed8; font-weight: 700; }

        @media only screen and (max-width: 480px) {
            .container { margin-top: 0 !important; margin-bottom: 0 !important; border-radius: 0 !important; }
            .content { padding: 0 16px 24px 16px !important; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-wrapper">
            <!-- Logo CID Placeholder -->
            <img src="cid:cbs-logo" alt="CBS Logo" class="logo" style="width: 52px; height: 52px; margin-right: 12px; vertical-align: middle;">
            <img src="cid:revora-logo" alt="CBS Revora Logo" class="logo" style="vertical-align: middle;">
        </div>

        <div class="content">
            {{CONTENT}}
        </div>

        <div class="footer">
            &copy; {{YEAR}} <span class="brand-name">CBS Revora</span>. All rights reserved.<br>
            Koperasi Cahaya Berkah Sejahtera<br>
            <span style="margin-top: 8px; display: block;">System generated email, please do not reply.</span>
        </div>
    </div>
</body>
</html>
